<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>

        <!-- Importação do CSS externo-->
    <link rel="stylesheet" href="loja.css">
   
    </html>
        
    
        
    </html>
</head>
<body>
   
    <!--
========================================
TABELAS EM HTML
========================================
-->
<table border="1" class="loja">
    
      <!-- table é o elemento principal-->
        <!-- tr - table row - linha -->
        <!-- primeira linha -->
        <tr>
            <p id="p2">
            <!-- 3 COLUNAS -->
             <!-- th - cabeçalho -->
            <th>imagem</th>
            <th>produto</th>
            <th>preco</th>
            <th>stock</th>
            </p>
        </tr>
        <!-- Segunda linha-->
         <tr>
            <!-- td - célula de dados -->
            <td><img src="martelo.webp" alt="Isto e uma foto"></td>
            <td>martelo</td>
            <td>4.00</td>
            <td>20</td>
         </tr>
          <!-- Terceira linha-->
          <tr>
            <!-- td - célula de dados -->
            <td><img src="chave_fendas.webp" alt="Isto e uma foto"></td>
            <td>chave de fendas</td>
            <td>2.00</td>
            <td>10</td>
         </tr>
       <!-- Quarta linha-->
          <tr>
            <!-- td - célula de dados -->
            <td><img src="fita_metrica.webp" alt="Isto e uma foto"></td>
            <td>fita metrica</td>
            <td>1.00</td>
            <td>6</td>
         </tr>

</table>
       <form>
      <div button class="voltar-btn">
      <button type="submit" formaction="/loja.html">Voltar</button>
      </div>
      </form>
       
</body>
</html>
