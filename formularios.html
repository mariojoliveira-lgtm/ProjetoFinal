<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<!--
========================================
FORMULÁRIOS BÁSICOS EM HTML
========================================
-->
<fieldset>
    <legend><strong>Formulários Básicos em HTML</strong></legend>
<!-- <h1>Formulários Básicos em HTML</h1> -->


<form action="">
    <!-- form - elemento HTML -->
     <!-- pode ser enviado para um URL ou para um ficheiro local-->

    <label for="nome"> Nome Completo </label>
    <input type="text" id="nome" name="nome" placeholder="Digite o seu nome" required minlength="2" size="50">
    <!-- id - Identificador do input deve ser idêntico ao utilizado no for="" do label
         type - tipo de dados que vamos introduzir
         name - nome do campo que vai existir no servidor após envio do form
         placeholder - texto temporário 
         required -> obrigatoriedade de preenchimento
         minlength -> Tamanho mínimo
         maxlength-> Tamanho máximo-->

    <label for="id_email"> Email </label>
    <input type="email"  
           id="id_email" 
           name="var_email" 
           placeholder="Digite o seu email" 
           required 
           minlength="2" 
           maxlength="20"
        > 


    <label for="password"> Password </label>
    <input type="password"  
           id="password" 
           name="password" 
           placeholder="Digite o sua password" 
           required 
           minlength="8"
        >
    <label for="idade"> Idade </label>
    <input type="number"  
               id="idade" 
               name="idade" 
               placeholder="Digite o sua idade" 
               required 
               min="18"
               max="100"
               step="1"
        >
        
    <label for="dataNascimento">Data de Nascimento</label>
    <input type="date" name="data_Nascimento" id="dataNascimento" min="2010-12-31">

    <label for="horario">Horário</label>
    <input type="time"
           id="horario"
           name="horario"
           min="09:00"
           max="18:00" 
    >

    <label for="pais">País</label>
    <select name="pais" id="pais" required>
        <!-- Select - lista vertical com opções-->
        <option value="" disabled selected>Selecione um país</option>
        <!-- option é o elemento da lista -->
        <!-- value - valor enviado ao servidor -->
        <!-- disabled - opção não disponível para envio -->
        <!-- selected - valor selecionado por defeito -->
        <option value="pt">Portugal</option>
        <option value="es">Espanha</option>
        <option value="fr">França</option>
        <option value="ds">Alemanha</option>
        <option value="outro">Outro</option>
    </select>
<br>
    <!-- Label principal -->
    <label>Género</label>
    <!-- Input antes do label das opções-->
    <!-- Só pode ter um valor enviado-->
    <!-- Garantir que todas as opções estão sobre o mesmo valor do atributo "name"-->
    <input type="radio" id="masculino" name="genero" value="masculino">
    <label for="masculino">Masculino</label>
    <input type="radio" id="feminino" name="genero" value="feminino">
    <label for="feminino">Feminino</label>


    <!-- checkbox-->
<br>
    <label>Interesses (selecione todos os que se aplicam)</label>
<br>
    <input type="checkbox" id="ler" name="interesses" value="leitura">
    <label for="ler">Leitura</label>
    <input type="checkbox" id="musica" name="interesses" value="musica">
    <label for="musica">Música</label>




    <button type="button">Enviar</button>
</fieldset>
<!-- Agrupar grupos de labels + inputs --> 

</form>
